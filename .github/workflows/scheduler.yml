name: Flight Price Tracker Bot

on:
  schedule:
    # 매시간 정각에 실행 (UTC 기준이므로 한국 시간은 +9시간)
    - cron: '0 * * * *'
  workflow_dispatch:
    # 필요할 때 버튼을 눌러 수동으로 즉시 실행 가능하게 함

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 스크립트가 데이터를 수정한 후 다시 Push할 수 있는 권한

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pytz
          playwright install chromium

      - name: Run Price Crawler
        run: python flight_crawler.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add flight_pricing_history.json
          # 변경사항이 있을 때만 커밋 (에러 방지)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update flight price history [$(date)]" && git push)
